site_name: Hibiscus
site_description: A lightweight, high-performance study planner and code editor built with React, Tauri, and Rust.
site_author: Andrew Ferns
repo_name: AndyFerns/Hibiscus
site_url: https://andyferns.github.io/Hibiscus/
repo_url: https://github.com/AndyFerns/Hibiscus
use_directory_urls: true
docs_dir: docs
site_dir: site

theme:
  name: material
  use_directory_urls: true
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Welcome: index.md
  - Guide:
      - Getting Started: guide/getting-started.md
      - Keyboard Shortcuts: guide/shortcuts.md
      - Theming: guide/theming.md
      - Study Tools: guide/study-tools.md
  - Developer:
      - Architecture: dev/architecture.md
      - Knowledge Pipeline: dev/knowledge-pipeline.md
      - API Reference: dev/api-reference.md
      - Contributing: dev/contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
